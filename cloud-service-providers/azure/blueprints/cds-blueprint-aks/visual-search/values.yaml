replicaCount: 1
image: "nvcr.io/nvidian/visual-search:latest"
containerPort: 8888
resources:
  requests:
    cpu: 500m
env:
  GUNICORN_PORT: "8888"
  GUNICORN_WORKERS: "1"
  FASTAPI_ROOT_PATH: "/api"
  MAX_DOCS_PER_UPLOAD: "10000"
  GUNICORN_TIMEOUT: "300"
